<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.pageOnlyIframe {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

.iframe-default {
    width: calc(100% / 1.5);
    height: calc(100% / 1.5);
    border: none;
    background: #fff;

    transform: scale(1.5);
    transform-origin: top left;
}
</style>
</head>

<body>

<div class="pageOnlyIframe">
    <iframe
        id="iframehtml5"
        class="iframe-default"
        src="https://jasongamesdev.github.io/cluster-rush/"
        title="Cluster Rush"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
